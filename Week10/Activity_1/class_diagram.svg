<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" width="860" height="520">
  <defs>
    <style>text { font-family: monospace; }</style>
    <!-- Hollow triangle: inheritance -->
    <marker id="inherit" markerWidth="12" markerHeight="9" refX="11" refY="4.5" orient="auto">
      <polygon points="0 0, 10 4.5, 0 9" fill="white" stroke="#555" stroke-width="1"/>
    </marker>
    <!-- Filled arrow: association -->
    <marker id="assoc" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#555"/>
    </marker>
    <!-- Open arrow: dependency -->
    <marker id="dep" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L9,3.5 L0,7" fill="none" stroke="#888" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="430" y="18" fill="#333" font-size="11" font-weight="bold" text-anchor="middle">
    Class Diagram — Healthcare Compliance Login &amp; Signup System
  </text>

  <!-- ═══════════════════════════ AbstractUser ═══════════════════════════ -->
  <!-- x=300 y=30 w=260 h=110 -->
  <rect x="300" y="30" width="260" height="110" fill="#f5f5f5" stroke="#555" stroke-width="1.5"/>
  <!-- header -->
  <rect x="300" y="30" width="260" height="28" fill="#9e9e9e"/>
  <text x="430" y="49" fill="white" font-size="10" font-weight="bold" text-anchor="middle">AbstractUser</text>
  <!-- divider -->
  <line x1="300" y1="58" x2="560" y2="58" stroke="#555" stroke-width="1"/>
  <!-- fields -->
  <text x="308" y="72"  fill="#333" font-size="9">- id : int</text>
  <text x="308" y="84"  fill="#333" font-size="9">- username : str</text>
  <text x="308" y="96"  fill="#333" font-size="9">- email : str</text>
  <text x="308" y="108" fill="#333" font-size="9">- password : str</text>
  <text x="308" y="120" fill="#333" font-size="9">- is_active : bool</text>
  <text x="308" y="132" fill="#333" font-size="9">- date_joined : datetime</text>

  <!-- ═══════════════════════════ User ═══════════════════════════ -->
  <!-- x=60 y=220 w=280 h=185 -->
  <rect x="60" y="220" width="280" height="185" fill="#f0fff4" stroke="#2e7d32" stroke-width="1.5"/>
  <!-- header -->
  <rect x="60" y="220" width="280" height="28" fill="#2e7d32"/>
  <text x="200" y="239" fill="white" font-size="10" font-weight="bold" text-anchor="middle">User</text>
  <!-- fields divider -->
  <line x1="60" y1="248" x2="340" y2="248" stroke="#2e7d32" stroke-width="1"/>
  <!-- fields -->
  <text x="68" y="262" fill="#1b5e20" font-size="9" font-weight="bold">+ full_name : CharField  ★</text>
  <text x="68" y="275" fill="#1b5e20" font-size="9" font-weight="bold">+ dob : DateField  ★</text>
  <text x="68" y="288" fill="#333"    font-size="9">+ role : str  { STAFF | ADMIN }</text>
  <text x="68" y="301" fill="#333"    font-size="9">+ email : EmailField  (login key)</text>
  <!-- methods divider -->
  <line x1="60" y1="312" x2="340" y2="312" stroke="#a5d6a7" stroke-width="1"/>
  <!-- methods -->
  <text x="68" y="325" fill="#555" font-size="9">+ __str__() : str</text>
  <text x="68" y="338" fill="#555" font-size="9">+ is_admin : bool  (property)</text>
  <!-- meta divider -->
  <line x1="60" y1="348" x2="340" y2="348" stroke="#a5d6a7" stroke-width="1"/>
  <text x="68" y="360" fill="#777" font-size="8.5">USERNAME_FIELD = 'email'</text>
  <text x="68" y="372" fill="#777" font-size="8.5">ordering = ['full_name']</text>
  <text x="68" y="385" fill="#777" font-size="8.5">DB table: accounts_user</text>
  <text x="68" y="398" fill="#777" font-size="8.5">role choices: Role (TextChoices)</text>

  <!-- ═══════════════════════════ PasswordResetToken ═══════════════════════════ -->
  <!-- x=520 y=220 w=300 h=185 -->
  <rect x="520" y="220" width="300" height="185" fill="#fffde7" stroke="#f57f17" stroke-width="1.5"/>
  <!-- header -->
  <rect x="520" y="220" width="300" height="28" fill="#f57f17"/>
  <text x="670" y="239" fill="white" font-size="10" font-weight="bold" text-anchor="middle">PasswordResetToken</text>
  <!-- fields divider -->
  <line x1="520" y1="248" x2="820" y2="248" stroke="#f57f17" stroke-width="1"/>
  <!-- fields -->
  <text x="528" y="262" fill="#333" font-size="9">+ id : int  (PK)</text>
  <text x="528" y="275" fill="#333" font-size="9">+ user : FK → User  (CASCADE)</text>
  <text x="528" y="288" fill="#333" font-size="9">+ token : str(64)  (unique)</text>
  <text x="528" y="301" fill="#333" font-size="9">+ expires_at : datetime</text>
  <text x="528" y="314" fill="#333" font-size="9">+ is_used : bool  (default False)</text>
  <text x="528" y="327" fill="#333" font-size="9">+ created_at : datetime  (auto)</text>
  <!-- methods divider -->
  <line x1="520" y1="337" x2="820" y2="337" stroke="#ffe082" stroke-width="1"/>
  <!-- methods -->
  <text x="528" y="350" fill="#555" font-size="9">+ save()  — auto-gen token &amp; expiry</text>
  <text x="528" y="363" fill="#555" font-size="9">+ is_valid() : bool</text>
  <text x="528" y="376" fill="#555" font-size="9">+ __str__() : str</text>
  <!-- meta divider -->
  <line x1="520" y1="386" x2="820" y2="386" stroke="#ffe082" stroke-width="1"/>
  <text x="528" y="398" fill="#777" font-size="8.5">DB table: accounts_passwordresettoken</text>

  <!-- ═══════════════════════════ ARROWS ═══════════════════════════ -->

  <!-- 1. Inheritance: User → AbstractUser (hollow triangle at AbstractUser) -->
  <path d="M200,220 L200,180 L430,180 L430,140"
        fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#inherit)"/>
  <text x="310" y="174" fill="#555" font-size="8.5" text-anchor="middle">extends</text>

  <!-- 2. FK: User 1 ──── 0..* PasswordResetToken -->
  <line x1="340" y1="340" x2="520" y2="340"
        stroke="#555" stroke-width="1.5" marker-end="url(#assoc)"/>
  <text x="350" y="334" fill="#333" font-size="9" font-weight="bold">1</text>
  <text x="498" y="334" fill="#333" font-size="9" font-weight="bold">0..*</text>
  <text x="430" y="334" fill="#555" font-size="8.5" text-anchor="middle">reset_tokens</text>

  <!-- ═══════════════════════════ LEGEND ═══════════════════════════ -->
  <rect x="0" y="458" width="860" height="62" fill="#fafafa" stroke="#ddd" stroke-width="1"/>

  <rect x="20"  y="468" width="12" height="12" fill="#9e9e9e"/>
  <text x="36"  y="479" fill="#555" font-size="8.5">Django built-in</text>

  <rect x="145" y="468" width="12" height="12" fill="#2e7d32"/>
  <text x="161" y="479" fill="#555" font-size="8.5">Custom User model</text>

  <rect x="295" y="468" width="12" height="12" fill="#f57f17"/>
  <text x="311" y="479" fill="#555" font-size="8.5">PasswordResetToken model</text>

  <line x1="480" y1="474" x2="515" y2="474" stroke="#555" stroke-width="1.5" marker-end="url(#inherit)"/>
  <text x="520" y="478" fill="#555" font-size="8.5">Inheritance</text>

  <line x1="610" y1="474" x2="645" y2="474" stroke="#555" stroke-width="1.5" marker-end="url(#assoc)"/>
  <text x="650" y="478" fill="#555" font-size="8.5">Association (FK)</text>

  <text x="20"  y="505" fill="#2e7d32" font-size="8.5" font-weight="bold">★ = Week 10 required fields: Full Name + Date of Birth</text>
  <text x="430" y="505" fill="#777"    font-size="8.5">MSE800 Week 10 Activity 1  ·  Group W  ·  2 DB tables total</text>
</svg>
