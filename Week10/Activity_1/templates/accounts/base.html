<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Healthcare Compliance System{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <style>
    body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
    .card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .card-header {
      background: linear-gradient(135deg, #1a6b4a 0%, #0d4a33 100%);
      color: white; border-radius: 16px 16px 0 0 !important;
      padding: 1.5rem 2rem;
    }
    .card-header h4 { margin: 0; font-weight: 700; letter-spacing: .5px; }
    .card-header small { opacity: .8; font-size: .8rem; }
    .btn-primary { background: #1a6b4a; border-color: #1a6b4a; }
    .btn-primary:hover { background: #0d4a33; border-color: #0d4a33; }
    .form-control:focus { border-color: #1a6b4a; box-shadow: 0 0 0 .2rem rgba(26,107,74,.25); }
    .alert { border-radius: 10px; }
    .badge-role { font-size: .7rem; vertical-align: middle; }
    a { color: #1a6b4a; }
    a:hover { color: #0d4a33; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark" style="background:#0d4a33;">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">🏥 Healthcare Compliance System</span>
    <div id="nav-auth" class="d-none">
      <span class="text-white me-3" id="nav-username"></span>
      <a href="/api/auth/profile-page/" class="btn btn-outline-light btn-sm me-2">My Profile</a>
      <button class="btn btn-outline-light btn-sm" onclick="doLogout()">Logout</button>
    </div>
  </div>
</nav>

<div class="container py-5">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Shared helpers
  const API = '/api/auth';

  function getToken() { return localStorage.getItem('access'); }

  function showAlert(id, msg, type='danger') {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = `alert alert-${type}`;
    el.textContent = msg;
    el.classList.remove('d-none');
  }

  function doLogout() {
    localStorage.removeItem('access');
    localStorage.removeItem('refresh');
    window.location = `${API}/login-page/`;
  }

  // Show nav username if logged in
  (function() {
    const token = getToken();
    if (!token) return;
    fetch(`${API}/me/`, { headers: { 'Authorization': `Bearer ${token}` } })
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (!data) return;
        document.getElementById('nav-username').textContent = `👤 ${data.full_name}`;
        document.getElementById('nav-auth').classList.remove('d-none');
      });
  })();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
