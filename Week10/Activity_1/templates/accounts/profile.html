{% extends "accounts/base.html" %}
{% block title %}My Profile — Healthcare Compliance{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">

    <!-- Profile Card -->
    <div class="card mb-4">
      <div class="card-header d-flex justify-content-between align-items-center">
        <div>
          <h4>My Profile</h4>
          <small>View and update your personal information</small>
        </div>
        <span id="role-badge" class="badge bg-light text-dark badge-role fs-6"></span>
      </div>
      <div class="card-body p-4">
        <div id="alert" class="alert d-none"></div>

        <form id="profile-form">
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" id="full_name" class="form-control" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Date of Birth</label>
              <input type="date" id="dob" class="form-control" required/>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" id="username" class="form-control"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Email (read-only)</label>
            <input type="email" id="email" class="form-control bg-light" readonly/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold text-muted">Member Since</label>
            <input type="text" id="date_joined" class="form-control bg-light" readonly/>
          </div>
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary fw-semibold">Save Changes</button>
            <button type="button" class="btn btn-outline-secondary" onclick="loadProfile()">Reset</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Change Password Card -->
    <div class="card">
      <div class="card-header">
        <h4>Change Password</h4>
        <small>Enter your current password to set a new one</small>
      </div>
      <div class="card-body p-4">
        <div id="pw-alert" class="alert d-none"></div>
        <form id="pw-form">
          <div class="mb-3">
            <label class="form-label fw-semibold">Current Password</label>
            <input type="password" id="old_password" class="form-control" required/>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">New Password</label>
              <input type="password" id="new_password" class="form-control" required/>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Confirm New Password</label>
              <input type="password" id="new_password2" class="form-control" required/>
            </div>
          </div>
          <button type="submit" class="btn btn-warning fw-semibold">Change Password</button>
        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
async function loadProfile() {
  const token = getToken();
  if (!token) { window.location = `${API}/login-page/`; return; }

  const res = await fetch(`${API}/me/`, {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  if (res.status === 401) { window.location = `${API}/login-page/`; return; }

  const data = await res.json();
  document.getElementById('full_name').value  = data.full_name || '';
  document.getElementById('dob').value        = data.dob       || '';
  document.getElementById('username').value   = data.username  || '';
  document.getElementById('email').value      = data.email     || '';
  document.getElementById('date_joined').value = new Date(data.date_joined).toLocaleDateString('en-NZ');
  document.getElementById('role-badge').textContent = `Role: ${data.role}`;
}

document.getElementById('profile-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = this.querySelector('button[type=submit]');
  btn.disabled = true;

  const res = await fetch(`${API}/me/`, {
    method: 'PUT',
    headers: {
      'Content-Type':  'application/json',
      'Authorization': `Bearer ${getToken()}`,
    },
    body: JSON.stringify({
      full_name: document.getElementById('full_name').value,
      dob:       document.getElementById('dob').value,
      username:  document.getElementById('username').value,
    }),
  });

  const data = await res.json();
  if (res.ok) {
    showAlert('alert', 'Profile updated successfully!', 'success');
  } else {
    const msgs = Object.entries(data).map(([k,v]) => `${k}: ${Array.isArray(v)?v.join(' '):v}`).join('\n');
    showAlert('alert', msgs || 'Update failed.', 'danger');
  }
  btn.disabled = false;
});

document.getElementById('pw-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const np  = document.getElementById('new_password').value;
  const np2 = document.getElementById('new_password2').value;
  if (np !== np2) { showAlert('pw-alert', 'New passwords do not match.', 'danger'); return; }

  const res = await fetch(`${API}/change-password/`, {
    method: 'POST',
    headers: {
      'Content-Type':  'application/json',
      'Authorization': `Bearer ${getToken()}`,
    },
    body: JSON.stringify({
      old_password: document.getElementById('old_password').value,
      new_password: np,
    }),
  });

  const data = await res.json();
  if (res.ok) {
    showAlert('pw-alert', 'Password changed! Please log in again.', 'success');
    setTimeout(doLogout, 2000);
  } else {
    const msgs = Object.entries(data).map(([k,v]) => `${k}: ${Array.isArray(v)?v.join(' '):v}`).join('\n');
    showAlert('pw-alert', msgs || 'Failed to change password.', 'danger');
  }
});

loadProfile();
</script>
{% endblock %}
