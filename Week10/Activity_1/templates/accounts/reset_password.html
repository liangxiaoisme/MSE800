{% extends "accounts/base.html" %}
{% block title %}Reset Password — Healthcare Compliance{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-header text-center">
        <h4>Reset Password</h4>
        <small>Set a new password for your account</small>
      </div>
      <div class="card-body p-4">
        <div id="alert" class="alert d-none"></div>

        <form id="reset-form">
          <!-- Token is injected server-side from query string -->
          <input type="hidden" id="token" value="{{ token }}"/>

          <div class="mb-3">
            <label class="form-label fw-semibold">New Password</label>
            <input type="password" id="new_password" class="form-control"
                   placeholder="Min 8 characters" required/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Confirm New Password</label>
            <input type="password" id="new_password2" class="form-control"
                   placeholder="Repeat password" required/>
          </div>
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg fw-semibold">Reset Password</button>
          </div>
        </form>

        <hr class="my-4"/>
        <div class="text-center small">
          <a href="/api/auth/login-page/">← Back to Sign In</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// If no token in the page, show error immediately
(function() {
  const token = document.getElementById('token').value;
  if (!token) {
    showAlert('alert', 'Invalid or missing reset token. Please request a new link.', 'danger');
    document.getElementById('reset-form').style.pointerEvents = 'none';
    document.getElementById('reset-form').style.opacity = '.5';
  }
})();

document.getElementById('reset-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const np  = document.getElementById('new_password').value;
  const np2 = document.getElementById('new_password2').value;
  if (np !== np2) {
    showAlert('alert', 'Passwords do not match.', 'danger');
    return;
  }

  const btn = this.querySelector('button[type=submit]');
  btn.disabled = true;
  btn.textContent = 'Resetting…';

  const res = await fetch(`${API}/reset-password/`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      token:         document.getElementById('token').value,
      new_password:  np,
      new_password2: np2,
    }),
  });

  const data = await res.json();
  if (res.ok) {
    showAlert('alert', data.message + ' Redirecting to login…', 'success');
    setTimeout(() => window.location = `${API}/login-page/`, 2000);
  } else {
    const msgs = Object.entries(data).map(([k,v]) => `${Array.isArray(v)?v.join(' '):v}`).join('\n');
    showAlert('alert', msgs || 'Reset failed.', 'danger');
    btn.disabled = false;
    btn.textContent = 'Reset Password';
  }
});
</script>
{% endblock %}
