{% extends "accounts/base.html" %}
{% block title %}Sign Up — Healthcare Compliance{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header text-center">
        <h4>Create Account</h4>
        <small>Join the Healthcare Compliance & Safety System</small>
      </div>
      <div class="card-body p-4">
        <div id="alert" class="alert d-none"></div>

        <form id="signup-form">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
              <input type="text" id="full_name" class="form-control" placeholder="Jane Smith" required/>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
              <input type="text" id="username" class="form-control" placeholder="jsmith" required/>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
            <input type="email" id="email" class="form-control" placeholder="you@hospital.nz" required/>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Date of Birth <span class="text-danger">*</span></label>
              <input type="date" id="dob" class="form-control" required/>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Role</label>
              <select id="role" class="form-select">
                <option value="STAFF" selected>Staff</option>
                <option value="ADMIN">Admin</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
              <input type="password" id="password" class="form-control" placeholder="Min 8 characters" required/>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-semibold">Confirm Password <span class="text-danger">*</span></label>
              <input type="password" id="password2" class="form-control" placeholder="Repeat password" required/>
            </div>
          </div>

          <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary btn-lg fw-semibold">Create Account</button>
          </div>
        </form>

        <hr class="my-4"/>
        <div class="text-center small">
          Already have an account? <a href="/api/auth/login-page/">Sign in</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('signup-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = this.querySelector('button[type=submit]');
  btn.disabled = true;
  btn.textContent = 'Creating account…';

  const res = await fetch(`${API}/register/`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      full_name: document.getElementById('full_name').value,
      username:  document.getElementById('username').value,
      email:     document.getElementById('email').value,
      dob:       document.getElementById('dob').value,
      role:      document.getElementById('role').value,
      password:  document.getElementById('password').value,
      password2: document.getElementById('password2').value,
    }),
  });

  const data = await res.json();
  if (res.ok) {
    localStorage.setItem('access',  data.access);
    localStorage.setItem('refresh', data.refresh);
    showAlert('alert', `Welcome, ${data.user.full_name}! Redirecting…`, 'success');
    setTimeout(() => window.location = `${API}/profile-page/`, 1200);
  } else {
    // Flatten all error messages from DRF
    const msgs = Object.entries(data).map(([k, v]) =>
      `${k}: ${Array.isArray(v) ? v.join(' ') : v}`
    ).join('\n');
    showAlert('alert', msgs || 'Registration failed.', 'danger');
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
});
</script>
{% endblock %}
