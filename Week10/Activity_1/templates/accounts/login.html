{% extends "accounts/base.html" %}
{% block title %}Login — Healthcare Compliance{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-header text-center">
        <h4>Sign In</h4>
        <small>Intelligent Healthcare Compliance & Safety System</small>
      </div>
      <div class="card-body p-4">
        <div id="alert" class="alert d-none"></div>

        <form id="login-form">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="you@hospital.nz" required/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required/>
          </div>
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary btn-lg fw-semibold">Sign In</button>
          </div>
        </form>

        <hr class="my-4"/>
        <div class="text-center small">
          <a href="/api/auth/forgot-password-page/">Forgot your password?</a>
          &nbsp;·&nbsp;
          <a href="/api/auth/signup-page/">Create an account</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = this.querySelector('button[type=submit]');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const res = await fetch(`${API}/login/`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email:    document.getElementById('email').value,
      password: document.getElementById('password').value,
    }),
  });

  const data = await res.json();
  if (res.ok) {
    localStorage.setItem('access',  data.access);
    localStorage.setItem('refresh', data.refresh);
    window.location = `${API}/profile-page/`;
  } else {
    const msg = data.non_field_errors?.[0] || data.detail || 'Login failed.';
    showAlert('alert', msg, 'danger');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
});
</script>
{% endblock %}
